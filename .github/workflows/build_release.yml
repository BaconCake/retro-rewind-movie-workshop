name: Build & Release

on:
  # Manually trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.8.0)'
        required: true
        default: 'v1.8.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller pillow

    - name: Build executable
      run: |
        pyinstaller RR_Movie_Workshop.spec --noconfirm

    - name: Download repak.exe
      run: |
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/trumank/repak/releases/latest"
        $asset = $release.assets | Where-Object { $_.name -match "x86_64-pc-windows-msvc" -and $_.name -match "\.zip$" }
        if ($asset) {
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "repak.zip"
          Expand-Archive -Path "repak.zip" -DestinationPath "repak_tmp"
          $repakExe = Get-ChildItem -Path "repak_tmp" -Recurse -Filter "repak.exe" | Select-Object -First 1
          Copy-Item $repakExe.FullName -Destination "repak.exe"
          Write-Host "Downloaded repak.exe from $($asset.browser_download_url)"
        } else {
          Write-Error "Could not find repak release asset"
          exit 1
        }
      shell: pwsh

    - name: Download texconv.exe
      run: |
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/DirectXTex/releases/latest"
        $asset = $release.assets | Where-Object { $_.name -match "texconv\.exe" -or ($_.name -match "texconv" -and $_.name -match "\.zip$") }
        if ($asset) {
          $dl = $asset | Select-Object -First 1
          Invoke-WebRequest -Uri $dl.browser_download_url -OutFile "texconv_dl"
          if ($dl.name -match "\.zip$") {
            Rename-Item "texconv_dl" "texconv.zip"
            Expand-Archive -Path "texconv.zip" -DestinationPath "texconv_tmp"
            $texExe = Get-ChildItem -Path "texconv_tmp" -Recurse -Filter "texconv.exe" | Select-Object -First 1
            Copy-Item $texExe.FullName -Destination "texconv.exe"
          } else {
            Rename-Item "texconv_dl" "texconv.exe"
          }
          Write-Host "Downloaded texconv.exe"
        } else {
          Write-Error "Could not find texconv release asset"
          exit 1
        }
      shell: pwsh

    - name: Package distribution
      run: |
        # Create tools folder
        New-Item -ItemType Directory -Path "dist\RR_Movie_Workshop\tools" -Force
        Copy-Item "repak.exe" "dist\RR_Movie_Workshop\tools\"
        Copy-Item "texconv.exe" "dist\RR_Movie_Workshop\tools\"
        
        # Copy licenses
        New-Item -ItemType Directory -Path "dist\RR_Movie_Workshop\LICENSES" -Force
        if (Test-Path "LICENSE") {
          Copy-Item "LICENSE" "dist\RR_Movie_Workshop\LICENSES\RR_Movie_Workshop-LICENSE"
        }
        if (Test-Path "LICENSES") {
          Copy-Item "LICENSES\*" "dist\RR_Movie_Workshop\LICENSES\" -Recurse
        }
        
        # Copy README
        if (Test-Path "README.txt") {
          Copy-Item "README.txt" "dist\RR_Movie_Workshop\"
        }
        
        # Create zip
        Compress-Archive -Path "dist\RR_Movie_Workshop\*" -DestinationPath "RR_Movie_Workshop_${{ github.event.inputs.version }}.zip"
        
        Write-Host "Package contents:"
        Get-ChildItem "dist\RR_Movie_Workshop\" -Recurse | ForEach-Object { Write-Host "  $($_.FullName.Replace((Get-Location).Path + '\dist\RR_Movie_Workshop\', ''))" }
      shell: pwsh

    - name: Generate checksums
      run: |
        $zip_hash = (Get-FileHash "RR_Movie_Workshop_${{ github.event.inputs.version }}.zip" -Algorithm SHA256).Hash
        $exe_hash = (Get-FileHash "dist\RR_Movie_Workshop\RR_Movie_Workshop.exe" -Algorithm SHA256).Hash
        
        $checksums = @"
        SHA256 Checksums for ${{ github.event.inputs.version }}
        
        RR_Movie_Workshop_${{ github.event.inputs.version }}.zip:
          $zip_hash
        
        RR_Movie_Workshop.exe:
          $exe_hash
        "@
        
        $checksums | Out-File -FilePath "checksums.txt" -Encoding utf8
        Write-Host $checksums
      shell: pwsh

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: "Retro Rewind Movie Workshop ${{ github.event.inputs.version }}"
        body: |
          ## Retro Rewind Movie Workshop ${{ github.event.inputs.version }}
          
          Custom VHS cover art and New Release standee tool for Retro Rewind.
          
          ### Download
          Download `RR_Movie_Workshop_${{ github.event.inputs.version }}.zip`, extract anywhere, and run `RR_Movie_Workshop.exe`.
          
          Everything is included — no Python or additional software needed.
          
          ### Included
          - RR_Movie_Workshop.exe (the tool)
          - tools/repak.exe (pak operations, MIT License)
          - tools/texconv.exe (texture conversion, MIT License)
          
          ### Checksums
          See `checksums.txt` for SHA256 hashes to verify file integrity.
          
          ### Nexus Mods
          Also available at: https://www.nexusmods.com/retrorewindvideostoresimulator/mods/82
        files: |
          RR_Movie_Workshop_${{ github.event.inputs.version }}.zip
          checksums.txt
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
